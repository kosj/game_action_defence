name: Export Web (Godot 4)

on:
  push:
    branches: [main, claude/todo-implementation-ag08aw]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-web:
    name: Build WebGL
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -vp ~/.local/share/godot/export_templates/4.3.stable
          mv /root/.local/share/godot/export_templates/4.3.stable/* \
             ~/.local/share/godot/export_templates/4.3.stable/

      - name: Export to Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Upload WebGL ZIP (always downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: build/web
          retention-days: 30

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/web

  deploy:
    name: Deploy to GitHub Pages
    needs: export-web
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deploy.outputs.page_url }}
    steps:
      - name: Deploy
        id: deploy
        uses: actions/deploy-pages@v4
