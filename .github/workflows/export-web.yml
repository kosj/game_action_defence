name: Export Web (Godot 4)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  export-web:
    name: Build WebGL & Deploy
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      - name: Setup export templates
        run: |
          mkdir -vp ~/.local/share/godot/export_templates/4.3.stable
          mv /root/.local/share/godot/export_templates/4.3.stable/* \
             ~/.local/share/godot/export_templates/4.3.stable/

      - name: Import assets
        run: |
          timeout 120 godot --headless --editor --quit 2>&1 | tail -30 || true

      - name: Export to Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Upload WebGL ZIP (always downloadable)
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: build/web
          retention-days: 30

      # 빌드 결과를 별도 배포 저장소(game_action_defence_deploy)의 gh-pages 브랜치로 push.
      # 인증은 Deploy Key(SSH) — 이 저장소의 DEPLOY_KEY 시크릿(개인키)과
      # 배포 저장소의 Deploy Key(공개키, write 허용)가 짝을 이룬다. (SETUP_DEPLOY.md 참고)
      - name: Deploy to external Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: kosj/game_action_defence_deploy
          publish_branch: gh-pages
          publish_dir: ./build/web
          # Godot 웹 export 산출물이 Jekyll 로 걸러지지 않도록 .nojekyll 자동 생성(기본값).
          enable_jekyll: false
          commit_message: "deploy: ${{ github.sha }}"
