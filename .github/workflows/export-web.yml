name: Export Web (Godot 4)

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Build WebGL
    runs-on: ubuntu-latest
    container:
      image: barichello/godot-ci:4.3
    steps:
      - uses: actions/checkout@v4

      # 배포 빌드 식별용 스탬프 — 커밋 SHA(7자리)·UTC 시각·브랜치를 build_info.json 에 기록.
      # 게임 타이틀/메뉴 하단에 표시돼 "지금 라이브가 어떤 빌드인지"를 눈으로 확인할 수 있다.
      # (에셋 import 이전에 써야 export 에 포함된다.)
      - name: Stamp build info
        run: |
          printf '{"sha":"%s","date":"%s","ref":"%s"}\n' \
            "${GITHUB_SHA:0:7}" "$(date -u '+%Y-%m-%d %H:%M UTC')" "${GITHUB_REF_NAME:-?}" \
            > build_info.json
          cat build_info.json

      - name: Setup export templates
        run: |
          mkdir -vp ~/.local/share/godot/export_templates/4.3.stable
          mv /root/.local/share/godot/export_templates/4.3.stable/* \
             ~/.local/share/godot/export_templates/4.3.stable/

      - name: Import assets
        run: |
          timeout 120 godot --headless --editor --quit 2>&1 | tail -30 || true

      - name: Export to Web
        run: |
          mkdir -p build/web
          godot --headless --export-release "Web" build/web/index.html

      - name: Upload WebGL build (artifact for deploy + manual download)
        uses: actions/upload-artifact@v4
        with:
          name: webgl-build
          path: build/web
          retention-days: 30

  deploy:
    name: Deploy to external Pages repo
    needs: build
    # 배포는 Godot 컨테이너가 아닌 "호스트 러너"에서 수행한다. godot-ci 이미지에는 ssh-agent
    # (openssh-client)가 없어 peaceiris 의 SSH 배포가 'ssh-agent ENOENT' 로 실패하기 때문.
    # ubuntu-latest 호스트에는 ssh-agent·git 이 기본 포함돼 있다.
    runs-on: ubuntu-latest
    steps:
      - name: Download WebGL build
        uses: actions/download-artifact@v4
        with:
          name: webgl-build
          path: build/web

      # 빌드 결과를 별도 배포 저장소(game_action_defence_deploy)의 gh-pages 브랜치로 push.
      # 인증은 Deploy Key(SSH) — 이 저장소의 DEPLOY_KEY 시크릿(개인키)과
      # 배포 저장소의 Deploy Key(공개키, write 허용)가 짝을 이룬다. (SETUP_DEPLOY.md 참고)
      - name: Deploy to external Pages repo
        uses: peaceiris/actions-gh-pages@v4
        with:
          deploy_key: ${{ secrets.DEPLOY_KEY }}
          external_repository: kosj/game_action_defence_deploy
          publish_branch: gh-pages
          publish_dir: ./build/web
          # Godot 웹 export 산출물이 Jekyll 로 걸러지지 않도록 .nojekyll 자동 생성(기본값).
          enable_jekyll: false
          commit_message: "deploy: ${{ github.sha }}"
